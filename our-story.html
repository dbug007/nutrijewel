<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriJewel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }
        header {
            background: url('header-bg.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
            position: relative;
        }
        header .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            z-index: 2;
        }
        header p {
            font-size: 1.2rem;
            margin: 10px 0;
            z-index: 2;
        }
        header a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: #fff;
            background: #4caf50;
            text-decoration: none;
            border-radius: 5px;
            z-index: 2;
            font-weight: bold;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
        }
        section {
            padding: 60px 50px;
            text-align: center;
        }
        section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .products .product {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .products .product:hover {
            transform: translateY(-10px);
        }
        .products img {
            width: 100%;
            height: auto;
        }
        footer {
            background: #222;
            color: #fff;
            padding: 20px 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NutriJewel</div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    <header>
        <div class="overlay"></div>
        <h1>Make Your Snacking Time <br> Best With Only NutriJewel</h1>
        <p>Shop Now for Premium Organic Teas and Snacks</p>
        <a href="#">Shop Now</a>
    </header>
    <section>
        <h2>What's Trending</h2>
        <div class="products">
            <div class="product">
                <img src="trending1.jpg" alt="Product 1">
                <p>Roselle Tea</p>
            </div>
            <div class="product">
                <img src="trending2.jpg" alt="Product 2">
                <p>Apple Flower Tea</p>
            </div>
            <div class="product">
                <img src="trending3.jpg" alt="Product 3">
                <p>Purple Rose Tea</p>
            </div>
            <div class="product">
                <img src="trending4.jpg" alt="Product 4">
                <p>Butterfly Pea Tea</p>
            </div>
        </div>
    </section>
    <footer>
        <p>&copy; 2025 NutriJewel. All Rights Reserved.</p>
    </footer>
</body>
</html>
