<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriJewel Social Preview Generator</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #93B559 0%, #7BA142 100%);
        }
        
        .preview-container {
            width: 1200px;
            height: 630px;
            position: relative;
            background: linear-gradient(135deg, #93B559 0%, #7BA142 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            box-sizing: border-box;
            color: white;
        }
        
        .left-content {
            flex: 1;
            z-index: 2;
        }
        
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 15px;
        }
        
        .main-title {
            font-size: 48px;
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 24px;
            margin: 0;
            opacity: 0.95;
            margin-bottom: 20px;
            font-style: italic;
        }
        
        .description {
            font-size: 18px;
            line-height: 1.4;
            margin-bottom: 25px;
            max-width: 500px;
        }
        
        .founder-info {
            font-size: 16px;
            background: rgba(255,255,255,0.2);
            padding: 12px 20px;
            border-radius: 25px;
            display: inline-block;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 300px;
        }
        
        .product-image {
            width: 140px;
            height: 140px;
            border-radius: 20px;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .decorative-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
        
        .circle-1 {
            width: 200px;
            height: 200px;
            top: -100px;
            right: -100px;
        }
        
        .circle-2 {
            width: 150px;
            height: 150px;
            bottom: -75px;
            left: -75px;
        }
        
        .circle-3 {
            width: 80px;
            height: 80px;
            top: 150px;
            right: 200px;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="decorative-elements">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
        
        <div class="left-content">
            <img src="/njlogo.png" alt="NutriJewel Logo" class="logo">
            <h1 class="main-title">NutriJewel</h1>
            <p class="subtitle">Premium Health & Nutrition Products</p>
            <p class="description">
                Handcrafted, nutritious snacks that promote health without compromising taste. 
                Sugar-free ladoos, protein bars, granola & more.
            </p>
            <div class="founder-info">
                By Dt. Ruchika Bachwani - Registered Pharmacist & Qualified Nutritionist
            </div>
        </div>
        
        <div class="products-grid">
            <img src="/images/granola.png" alt="Signature Granola" class="product-image">
            <img src="/images/blissbites.png" alt="Bliss Bites" class="product-image">
            <img src="/images/fresh batch of cambridge of chocolate cake.jpeg" alt="Cambridge Cake" class="product-image">
            <img src="/images/nutribars.png" alt="Nutri Bars" class="product-image">
        </div>
    </div>
</body>
</html>
